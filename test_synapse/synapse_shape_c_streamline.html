<title>Synapse - Shape C (Streamline / Tentacle)</title>
<style>

const SPHERE_R = 80;
const FADE_START = SPHERE_R + 50;
const ROT_Y = 0.4;
const ROT_X = 0.3;
const BASE_LINE_W = 0.48;
const BASE_DOT_SIZE = 0.7;
const CONNECT_DIST_3D = 50;
const LINE_ALPHA_MUL = 1.2;
const FADE_IN_T = 0.03;
const ORIGIN_STROKE_RATIO = 0.01;

const PARTICLE_SPEED = 0.0002;

  {ox:-96.7,oy:-270.3,oz:-416.7,originR:24.4,cpDistRatio:0.331,cpJitterT:-0.378,cpJitterP:-0.142,spread:42.3,baseAlpha:0.289,densityMul:1,ptsCount:20},

  {ox:-256.5,oy:-229.7,oz:47.2,originR:18.5,cpDistRatio:0.452,cpJitterT:-0.239,cpJitterP:0.206,spread:22.2,baseAlpha:0.225,densityMul:1,ptsCount:20},
  {ox:58.8,oy:-313.4,oz:-192.4,originR:20.3,cpDistRatio:0.34,cpJitterT:-0.238,cpJitterP:0.292,spread:42.3,baseAlpha:0.381,densityMul:1,ptsCount:20},
  {ox:56.8,oy:-298.1,oz:107.8,originR:24.4,cpDistRatio:0.399,cpJitterT:0.287,cpJitterP:0.108,spread:18.6,baseAlpha:0.394,densityMul:1,ptsCount:20},
  {ox:-87.2,oy:-411.5,oz:-94.3,originR:23.4,cpDistRatio:0.462,cpJitterT:-0.019,cpJitterP:0.103,spread:42.3,baseAlpha:0.382,densityMul:1,ptsCount:20},
  {ox:38.8,oy:-515.7,oz:-7.3,originR:24.2,cpDistRatio:0.332,cpJitterT:-0.155,cpJitterP:0.117,spread:28.8,baseAlpha:0.297,densityMul:1,ptsCount:20},
  {ox:-69.5,oy:-196,oz:17.4,originR:15.7,cpDistRatio:0.303,cpJitterT:0.131,cpJitterP:0.205,spread:46.4,baseAlpha:0.36,densityMul:1,ptsCount:20}
];

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const statsEl = document.getElementById('stats');
let W, H, dpr, viewScale;

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  viewScale = Math.min(2.0, 1 + (W - 300) / 1620);
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();

let seed = 777;
function sRand() { seed = (seed * 16807) % 2147483647; return (seed - 1) / 2147483646; }
function sRandRange(a, b) { return a + sRand() * (b - a); }

function project(x, y, z) {
  const cr = Math.cos(ROT_Y), sr = Math.sin(ROT_Y);
  const cx = Math.cos(ROT_X), sx = Math.sin(ROT_X);
  let x1 = x * cr - z * sr;
  let z1 = x * sr + z * cr;
  let y1 = y * cx - z1 * sx;
  let z2 = y * sx + z1 * cx;
  const d = FL + z2;
  if (d < 50) return null;
  const scale = FL / d * viewScale;
  return { sx: W / 2 + x1 * scale, sy: H / 2 + y1 * scale, scale, z: z2 };
}

function buildBundles() {
  seed = 777;
  return ORIGINS.map(o => {
    // We generate TWO control points for a Cubic Bezier to create an S-curve (Tentacle shape)
    // Shift them heavily towards a global "wind" direction
    const windScale = 0.8;
    
    // CP1: Blow outwards from the origin but shift with current
    const cp1x = o.ox * 1.5 + 200 * windScale;
    const cp1y = o.oy - 100 * windScale;
    const cp1z = o.oz * 1.5 + 150 * windScale;
    
    // CP2: Hook underneath and pull back against the current before hitting center
    const cp2x = -250 * windScale;
    const cp2y = 150 * windScale;
    const cp2z = -150 * windScale;
    
    const particles = [];
    for (let i = 0; i < o.ptsCount; i++) {
      particles.push({
        t: i / o.ptsCount,
        offX: sRandRange(-o.spread, o.spread),
        offY: sRandRange(-o.spread, o.spread),
        offZ: sRandRange(-o.spread, o.spread),
        size: sRandRange(0.6, 1),
        alpha: sRandRange(0.35, 0.8)
      });
    }
    return { ox: o.ox, oy: o.oy, oz: o.oz, cp1x, cp1y, cp1z, cp2x, cp2y, cp2z, particles, originR: o.originR, baseAlpha: o.baseAlpha, densityMul: o.densityMul };
  });
}

const bundles = buildBundles();

function cubicBezier3D(o, cp1, cp2, t) {
  const u = 1 - t;
  const t2 = t * t;
  const u2 = u * u;
  const u3 = u2 * u;
  const t3 = t2 * t;
  return {
    x: u3 * o.x + 3 * u2 * t * cp1.x + 3 * u * t2 * cp2.x + t3 * 0,
    y: u3 * o.y + 3 * u2 * t * cp1.y + 3 * u * t2 * cp2.y + t3 * 0,
    z: u3 * o.z + 3 * u2 * t * cp1.z + 3 * u * t2 * cp2.z + t3 * 0
  };
}

let lineCount = 0, culledCount = 0;

function animate() {
  ctx.clearRect(0, 0, W, H);
  lineCount = 0; culledCount = 0;
  let totalPts = 0;
  const allItems = [];

  bundles.forEach(b => {
    const bundlePts = [];
    totalPts += b.particles.length;
    const originProj = project(b.ox, b.oy, b.oz);
    if (originProj) {
      allItems.push({ type: 'origin', x: originProj.sx, y: originProj.sy, r: b.originR * originProj.scale, z: originProj.z, scale: originProj.scale, densityMul: b.densityMul });
    }
    b.particles.forEach(p => {
      p.t += PARTICLE_SPEED;
      if (p.t > 1) p.t -= 1;
      const t = p.t;
      const squeeze = 1 - t * t;
      // Using Cubic Bezier to allow graceful S-curves
      const pos = cubicBezier3D(
        { x: b.ox + p.offX * squeeze, y: b.oy + p.offY * squeeze, z: b.oz + p.offZ * squeeze },
        { x: b.cp1x + p.offX * squeeze * 0.4, y: b.cp1y + p.offY * squeeze * 0.4, z: b.cp1z + p.offZ * squeeze * 0.4 },
        { x: b.cp2x + p.offX * squeeze * 0.2, y: b.cp2y + p.offY * squeeze * 0.2, z: b.cp2z + p.offZ * squeeze * 0.2 },
        t
      );
      const distFromCenter = Math.sqrt(pos.x * pos.x + pos.y * pos.y + pos.z * pos.z);
      if (distFromCenter < SPHERE_R) { culledCount++; return; }
      const proj = project(pos.x, pos.y, pos.z);
      if (!proj) return;
      const fadeIn = t < FADE_IN_T ? t / FADE_IN_T : 1;
      const sphereFade = distFromCenter < FADE_START ? (distFromCenter - SPHERE_R) / (FADE_START - SPHERE_R) : 1;
      const fade = fadeIn * sphereFade;
      bundlePts.push({
        x: proj.sx, y: proj.sy, scale: proj.scale, z: proj.z,
        wx: pos.x, wy: pos.y, wz: pos.z,
        size: p.size * BASE_DOT_SIZE * proj.scale,
        alpha: p.alpha * fade * b.densityMul
      });
    });

    for (let i = 0; i < bundlePts.length; i++) {
        for (let j = i + 1; j < bundlePts.length; j++) {
            const a = bundlePts[i], c = bundlePts[j];
            const dx = a.wx - c.wx, dy = a.wy - c.wy, dz = a.wz - c.wz;
            const dist3D = Math.sqrt(dx * dx + dy * dy + dz * dz);
            // Slightly longer connect dist to maintain webs as they stretch through the S-curve
            if (dist3D < CONNECT_DIST_3D * 1.2) {
            const avgScale = (a.scale + c.scale) / 2;
            const lineAlpha = (1 - dist3D / (CONNECT_DIST_3D * 1.2)) * Math.min(a.alpha, c.alpha) * b.baseAlpha * LINE_ALPHA_MUL;
            const thickness = BASE_LINE_W * avgScale;
            allItems.push({ type: 'line', x1: a.x, y1: a.y, x2: c.x, y2: c.y, alpha: lineAlpha, z: (a.z + c.z) / 2, thickness });
            lineCount++;
            }
        }
    }
    bundlePts.forEach(p => allItems.push({ type: 'dot', ...p }));
  });

  const sphereProj = project(0, 0, 0);
  if (sphereProj) allItems.push({ type: 'sphere', z: 0, proj: sphereProj });

  allItems.sort((a, b) => b.z - a.z);

  allItems.forEach(item => {
    if (item.type === 'line') {
      ctx.beginPath();
      ctx.moveTo(item.x1, item.y1);
      ctx.lineTo(item.x2, item.y2);
      ctx.strokeStyle = `rgba(0,0,0,${Math.min(item.alpha, 1)})`;
      ctx.lineWidth = item.thickness;
      ctx.stroke();
    } else if (item.type === 'dot') {
      ctx.beginPath();
      ctx.arc(item.x, item.y, item.size, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(0,0,0,${Math.min(item.alpha, 1)})`;
      ctx.fill();
    } else if (item.type === 'origin') {
      const strokeW = item.r * ORIGIN_STROKE_RATIO;
      ctx.beginPath();
      ctx.arc(item.x, item.y, item.r, 0, Math.PI * 2);
      ctx.strokeStyle = item.densityMul === 2 ? '#000' : 'rgba(0,0,0,0.5)';
      ctx.lineWidth = Math.max(0.15, strokeW);
      ctx.stroke();
      const dotR = BASE_DOT_SIZE * item.scale * ORIGIN_DOT_MUL;
      ctx.beginPath();
      ctx.arc(item.x, item.y, dotR, 0, Math.PI * 2);
      ctx.fillStyle = item.densityMul === 2 ? '#000' : 'rgba(0,0,0,0.5)';
      ctx.fill();
    } else if (item.type === 'sphere') {
      const s = item.proj;
      const r = SPHERE_R * s.scale;
      ctx.beginPath();
      ctx.arc(s.sx, s.sy, r, 0, Math.PI * 2);
      ctx.fillStyle = '#000';
      ctx.fill();
    }
  });

  const rendered = totalPts - culledCount;
  statsEl.textContent = 'Shape C: Streamline / Tentacle | rendered: ' + rendered + '/' + totalPts + ' | culled: ' + culledCount + ' | lines: ~' + lineCount;
  requestAnimationFrame(animate);
}
animate();
window.addEventListener('resize', resize);
</script>
</body>
